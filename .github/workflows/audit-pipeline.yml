name: Audit-Auto Full Audit Pipeline

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - discover
          - scrape
          - audit
      region:
        description: 'Target region'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - us
          - eu
      max_sites:
        description: 'Maximum sites to process'
        required: false
        default: '50'

concurrency:
  group: audit-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  OPENCODE_MODEL: 'opencode/mimo-v2.5-free'

jobs:
  scrape:
    name: 🔍 Scrape Targets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    outputs:
      target_count: ${{ steps.scrape.outputs.target_count }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Discover new targets
        run: |
          echo "🔍 Discovering new targets at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          node scripts/discover-targets.mjs

      - name: Merge TOML targets into master list
        run: node scripts/merge-static-targets.mjs

      - name: Run scraper
        id: scrape
        run: |
          echo "🔍 Starting scrape at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          node scripts/full-scraper.mjs --audit
          
          if [ -f "data/latest-scrape-results.json" ]; then
            TARGET_COUNT=$(node -e "const d=require('./data/latest-scrape-results.json');console.log(d.totalScraped||0)")
            echo "target_count=$TARGET_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Scraped $TARGET_COUNT targets"
          else
            echo "target_count=0" >> $GITHUB_OUTPUT
            echo "⚠️  No scrape results found"
          fi

      - name: Upload scrape results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_id }}
          path: data/latest-scrape-results.json
          retention-days: 7

      - name: Commit scrape results
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/known-targets.json data/latest-scrape-results.json data/scrape-history.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: scrape results [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }} || echo "Push failed, continuing..."

  audit:
    name: 🤖 AI Audit
    runs-on: ubuntu-latest
    needs: scrape
    timeout-minutes: 45
    permissions:
      contents: write
    
    outputs:
      audit_count: ${{ steps.audit.outputs.audit_count }}
      avg_score: ${{ steps.audit.outputs.avg_score }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results-${{ github.run_id }}
          path: data/

      - name: Install OpenCode CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/opencode-ai/opencode/refs/heads/main/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Verify OpenCode installation
        run: opencode --version

      - name: Run AI audits
        id: audit
        env:
          OPENCODE_MODEL: ${{ env.OPENCODE_MODEL }}
        run: |
          echo "🤖 Starting AI audits at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          node scripts/ai-auditor.mjs --all
          
          if [ -f "data/latest-audit-summary.json" ]; then
            AUDIT_COUNT=$(node -e "const d=require('./data/latest-audit-summary.json');console.log(d.newAudits||0)")
            SKIP_COUNT=$(node -e "const d=require('./data/latest-audit-summary.json');console.log(d.skippedUnchanged||0)")
            AVG_SCORE=$(node -e "const d=require('./data/latest-audit-summary.json');console.log(d.averageScores?.overall||0)")
            echo "audit_count=$AUDIT_COUNT" >> $GITHUB_OUTPUT
            echo "avg_score=$AVG_SCORE" >> $GITHUB_OUTPUT
            echo "✅ Audited $AUDIT_COUNT sites (${SKIP_COUNT} unchanged, avg: $AVG_SCORE%)"
          else
            echo "audit_count=0" >> $GITHUB_OUTPUT
            echo "avg_score=0" >> $GITHUB_OUTPUT
            echo "⚠️  No audit results found"
          fi

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: audit-results-${{ github.run_id }}
          path: |
            audits/
            data/latest-audit-summary.json
          retention-days: 30

      - name: Commit audit results
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/known-targets.json data/audit-registry.json data/scrape-history.json data/latest-*.json 2>/dev/null || true
          git add audits/ --ignore-errors 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: audit results [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin ${{ github.ref_name }} || echo "Push failed, continuing..."

  build:
    name: 📦 Build Dashboard
    runs-on: ubuntu-latest
    needs: [scrape, audit]
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Download scrape results
        uses: actions/download-artifact@v4
        with:
          name: scrape-results-${{ github.run_id }}
          path: data/

      - name: Download audit results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: audit-results-${{ github.run_id }}
          path: |
            audits/
            data/

      - name: Generate dashboard data
        run: node scripts/generate-dashboard-data.mjs

      - name: Build Nuxt dashboard
        run: npm run generate

      - name: Upload Pages artifact
        if: success() && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 🚀 Deploy Dashboard
    runs-on: ubuntu-latest
    needs: [scrape, audit, build]
    if: github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    name: 📊 Generate Report
    runs-on: ubuntu-latest
    needs: [scrape, audit, build, deploy]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate run summary
        run: |
          echo "## 🚀 Audit-Auto Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run Number** | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Mode** | ${{ github.event.inputs.mode || 'full' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | ${{ github.event.inputs.region || 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Targets Scraped** | ${{ needs.scrape.outputs.target_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Sites Audited** | ${{ needs.audit.outputs.audit_count || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Average Score** | ${{ needs.audit.outputs.avg_score || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Dashboard](https://hautlys.github.io/audit-auto/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Repository](https://github.com/hautlys/audit-auto)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Next Scheduled Run" >> $GITHUB_STEP_SUMMARY
          echo "The next scheduled run will occur in approximately 2 hours." >> $GITHUB_STEP_SUMMARY

      - name: Upload run summary
        uses: actions/upload-artifact@v4
        with:
          name: run-summary-${{ github.run_id }}
          path: |
            data/latest-audit-summary.json
            data/pipeline-stats.json
          retention-days: 90
